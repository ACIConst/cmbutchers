<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline - Champ's Meats</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0d0b;color:#e8dcc8;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:24px}
.wrap{max-width:400px}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:22px;font-weight:800;letter-spacing:2px;margin-bottom:12px}
p{font-size:15px;color:#9b958c;line-height:1.6;margin-bottom:24px}
button{background:#9b1c1c;color:#e8dcc8;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
button:active{opacity:.8}
</style>
</head>
<body>
<div class="wrap">
<div class="icon">&#x1F4E1;</div>
<h1>You're Offline</h1>
<p>It looks like you've lost your internet connection. Please check your network and try again.</p>
<button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
